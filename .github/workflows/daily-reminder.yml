name: 每日 EnglishPod 单词提醒

on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: "0 23 * * *"
  workflow_dispatch:  # 允许手动触发测试

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送微信通知
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: |
          RESPONSE=
          echo "Server酱返回: $RESPONSE"
